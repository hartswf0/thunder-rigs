# UPGRADE PATH — Durable Objects relay (smooth 100ms, strongly consistent).
# Requires a Cloudflare Workers *Paid* plan ($5/mo). To use it:
#   npx wrangler deploy --config wrangler.do.toml
# then set the game's <meta name="thunder-tier"> back to "paid".
name = "thunder-rigs-relay"
main = "src/index.do.js"
compatibility_date = "2024-09-01"

[[durable_objects.bindings]]
name = "ROOMS"
class_name = "ThunderRoom"

[[migrations]]
tag = "v1"
new_classes = ["ThunderRoom"]
